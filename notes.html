<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library - Mahrshi Vedvyas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #fdfaf1; padding-bottom: 30px; }
        
        /* Header Section */
        .header { 
            background: linear-gradient(135deg, #B8860B, #8B6508); 
            color: white; 
            padding: 25px 15px; 
            text-align: center; 
            border-bottom-left-radius: 30px; 
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header h2 { font-size: 22px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }

        .container { padding: 20px; }

        /* Selection Card */
        .selection-card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
            margin-bottom: 25px;
            border: 1px solid #eee;
        }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #555; }
        
        select { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #f1f1f1; 
            font-size: 16px; 
            background: #fafafa;
            outline: none;
            transition: 0.3s;
        }
        select:focus { border-color: #B8860B; }

        /* Section Titles */
        .section-title { 
            font-size: 16px; 
            font-weight: bold; 
            color: #B8860B; 
            margin: 25px 0 15px 5px; 
            display: flex; 
            align-items: center; 
        }
        .section-title::before {
            content: ""; width: 4px; height: 18px; background: #B8860B; margin-right: 10px; border-radius: 2px;
        }

        /* Subject Grid */
        .subject-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }
        .sub-btn { 
            background: white; 
            padding: 18px 10px; 
            border-radius: 15px; 
            border: 1px solid #eee; 
            color: #333; 
            font-weight: 600; 
            text-decoration: none; 
            font-size: 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: 0.3s;
            display: block;
        }
        .sub-btn:active { 
            transform: scale(0.95); 
            background: #B8860B; 
            color: white; 
            border-color: #B8860B;
        }

        /* Footer Navigation */
        .footer-nav { margin-top: 20px; }
        .btn-home { 
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 15px; background: #333; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📚 डिजिटल लाइब्रेरी</h2>
        <p>महर्षि वेदव्यास संस्थान (सहदौरा)</p>
    </div>

    <div class="container">
        <div class="selection-card">
            <label>अपनी कक्षा का चयन करें:</label>
            <select id="notes-class">
                <option value="">-- यहाँ क्लिक करें --</option>
                <option value="1">कक्षा 1</option>
                <option value="2">कक्षा 2</option>
                <option value="3">कक्षा 3</option>
                <option value="4">कक्षा 4</option>
                <option value="5">कक्षा 5</option>
                <option value="6">कक्षा 6</option>
                <option value="7">कक्षा 7</option>
                <option value="8">कक्षा 8</option>
                <option value="9">कक्षा 9</option>
                <option value="10">कक्षा 10</option>
            </select>
        </div>

        <div class="section-title">A. मुख्य विषय</div>
        <div class="subject-grid">
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">📖 हिंदी</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">📖 अंग्रेजी</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">🌍 सा. विज्ञान</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">📐 गणित</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">🕉️ संस्कृत</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">🔬 विज्ञान</a>
        </div>

        <div class="section-title">B. अन्य कौशल</div>
        <div class="subject-grid">
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">⚙️ मैकेनिक्स</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">💻 कंप्यूटर</a>
        </div>

        <div class="footer-nav">
            <a href="dashboard.html" class="btn-home">🏠 मुख्य डैशबोर्ड</a>
        </div>
    </div>

    <script>
        function checkClass(e) {
            const cls = document.getElementById('notes-class').value;
            if(!cls) {
                alert("कृपया पहले अपनी कक्षा चुनें!");
                e.preventDefault();
            }
        }
    </script>
</body>
                    </html>
