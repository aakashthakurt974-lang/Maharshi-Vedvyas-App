<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library - Mahrshi Vedvyas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fdfaf1; padding-bottom: 30px; }
        
        .header { 
            background: linear-gradient(135deg, #B8860B, #8B6508); 
            color: white; padding: 20px 15px; text-align: center; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container { padding: 15px; }

        .selection-card { 
            background: white; padding: 15px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        select { 
            width: 100%; padding: 12px; border-radius: 10px; 
            border: 2px solid #eee; font-size: 16px; outline: none;
        }

        .section-title { 
            font-size: 15px; font-weight: bold; color: #B8860B; 
            margin: 20px 0 10px 5px; border-left: 4px solid #B8860B; padding-left: 10px;
        }

        .subject-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; 
        }
        .sub-btn { 
            background: white; padding: 15px 5px; border-radius: 12px; 
            border: 1px solid #ddd; color: #333; font-weight: 600; 
            text-decoration: none; font-size: 13px; text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: 0.2s;
        }
        .sub-btn:active { background: #B8860B; color: white; border-color: #B8860B; }

        .footer-nav { margin-top: 25px; }
        .btn-home { 
            display: block; width: 100%; padding: 14px; background: #333; 
            color: white; text-decoration: none; border-radius: 10px; 
            text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📚 डिजिटल लाइब्रेरी (नोट्स)</h2>
        <p>महर्षि वेदव्यास संस्थान (सहदौरा)</p>
    </div>

    <div class="container">
        <div class="selection-card">
            <label>अपनी कक्षा चुनें:</label>
            <select id="notes-class">
                <option value="">-- यहाँ से चुनें --</option>
                <option value="1">कक्षा 1</option>
                <option value="2">कक्षा 2</option>
                <option value="3">कक्षा 3</option>
                <option value="4">कक्षा 4</option>
                <option value="5">कक्षा 5</option>
                <option value="6">कक्षा 6</option>
                <option value="7">कक्षा 7</option>
                <option value="8">कक्षा 8</option>
                <option value="9">कक्षा 9</option>
                <option value="10">कक्षा 10</option>
            </select>
        </div>

        <div class="section-title">A. आधारभूत पाठ्यक्रम</div>
        <div class="subject-grid">
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">1. हिंदी</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">2. अंग्रेजी</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">3. सा. विज्ञान</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">4. गणित</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">5. संस्कृत</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">6. विज्ञान</a>
        </div>

        <div class="section-title">B. कौशल विकास एवं अन्य</div>
        <div class="subject-grid">
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">1. मैकेनिक्स</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">2. इलेक्ट्रॉनिक</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">3. कंप्यूटर</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">4. प्रोजेक्ट मेकिंग</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">5. डिजिटल कौशल</a>
            <a href="https://drive.google.com/drive/folders/1j4VcqQsa2MJKvoJ7WQMedei-BE1xtLsy" class="sub-btn" onclick="checkClass(event)">6. कला एवं संगीत</a>
        </div>

        <div class="footer-nav">
            <a href="dashboard.html" class="btn-home">🏠 मुख्य डैशबोर्ड</a>
        </div>
    </div>

    <script>
        function checkClass(e) {
            const cls = document.getElementById('notes-class').value;
            if(!cls) {
                alert("कृपया पहले अपनी कक्षा चुनें!");
                e.preventDefault();
            }
        }
    </script>
</body>
                                                        </html>
