<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mahrshi Vedvyas</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f7f6;
            font-family: sans-serif;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-card img {
            width: 80px;
            margin-bottom: 20px;
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #B8860B;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #8B6508; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://i.ibb.co/8Dhf204B/1000014674.png" alt="Logo">
        <h2>लॉगिन करें</h2>
        <p>आगे बढ़ने के लिए अपना 10 अंकों का मोबाइल नंबर दर्ज करें</p>
        
        <input type="number" id="phone" placeholder="मोबाइल नंबर (10 अंक)" maxlength="10">
        <button onclick="sendOTP()">OTP भेजें</button>
        
        <div id="otp-section" style="display:none; margin-top:20px;">
            <input type="number" id="otp" placeholder="6 अंकों का OTP डालें">
            <button onclick="verifyOTP()">आगे बढ़ें</button>
        </div>
    </div>

    <script>
        function sendOTP() {
            const phone = document.getElementById('phone').value;
            if(phone.length === 10) {
                alert("OTP आपके नंबर " + phone + " पर भेज दिया गया है (Demo)");
                document.getElementById('otp-section').style.display = 'block';
            } else {
                alert("कृपया सही 10 अंकों का नंबर डालें");
            }
        }

        function verifyOTP() {
            const otp = document.getElementById('otp').value;
            if(otp.length === 6) {
                window.location.href = "profile.html"; // इसके बाद प्रोफाइल सेटअप पेज पर जाएंगे
            } else {
                alert("कृपया 6 अंकों का सही OTP डालें");
            }
        }
    </script>
</body>
</html>
