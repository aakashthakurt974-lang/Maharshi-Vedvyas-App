<script>
    // ... (बाकी सब सेम रहेगा, बस window.onload वाले हिस्से में ये बदलाव है)
    window.onload = function() {
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                const savedName = localStorage.getItem('userName') || user.displayName;
                document.getElementById('display-name').innerText = savedName;
                const myUploadedPic = localStorage.getItem('userProfilePic');
                document.getElementById('user-pfp').src = myUploadedPic || user.photoURL || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            } else { window.location.href = "login.html"; }
        });

        const wrapper = document.getElementById('slider-wrapper');
        const adKeys = ['ad1', 'ad2', 'ad3', 'ad4'];
        let adContent = "";
        totalAds = 0; // इसे ग्लोबल रखने के लिए यहाँ रीसेट किया

        adKeys.forEach((key) => {
            const imgData = localStorage.getItem(key);
            if(imgData) {
                adContent += `<img src="${imgData}" style="width: 100vw;">`;
                totalAds++;
            }
        });

        if(totalAds === 0) {
            adContent = `<img src="https://via.placeholder.com/600x200?text=Welcome+to+Mahrshi+Vedvyas" style="width: 100vw;">`;
            totalAds = 1;
        }

        wrapper.innerHTML = adContent;
        // पक्का किया कि विड्थ सही हो ताकि चारों दिखें
        wrapper.style.width = (totalAds * 100) + "vw"; 
        if(totalAds > 1) startSlider();
    };

    function startSlider() {
        const wrapper = document.getElementById('slider-wrapper');
        setInterval(() => {
            currentSlide = (currentSlide + 1) % totalAds;
            // स्लाइड को खिसकाने का सही तरीका
            wrapper.style.transform = `translateX(-${currentSlide * 100}vw)`;
        }, 3500); 
    }
            </script>
