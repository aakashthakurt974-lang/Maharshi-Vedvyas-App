<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - Mahrshi Vedvyas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: #fdfaf1; padding: 20px;
        }
        .profile-card {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px;
            text-align: center; border-top: 6px solid #B8860B;
            position: relative; overflow: hidden;
        }
        .profile-card::before {
            content: ""; position: absolute; top: -50px; left: -50px; width: 100px; height: 100px;
            background: rgba(184, 134, 11, 0.1); border-radius: 50%; z-index: 0;
        }

        /* आकर्षक फोटो अपलोड सेक्शन */
        .photo-container { position: relative; width: 130px; height: 130px; margin: 0 auto 30px; z-index: 1; }
        .photo-upload {
            width: 100%; height: 100%; background: #f1f1f1; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid #B8860B; overflow: hidden; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .photo-upload:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(184, 134, 11, 0.2); }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        .upload-icon {
            position: absolute; bottom: 5px; right: 5px; background: #B8860B;
            color: white; width: 35px; height: 35px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        h3 { color: #333; margin-bottom: 25px; font-size: 22px; z-index: 1; position: relative; }
        
        /* इनपुट फील्ड्स का स्टाइल */
        .input-group { text-align: left; margin-bottom: 15px; position: relative; z-index: 1; }
        .input-group label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; margin-left: 5px; }
        
        input, select {
            width: 100%; padding: 14px 15px; border: 2px solid #eee;
            border-radius: 12px; font-size: 16px; outline: none;
            transition: 0.3s; background: #fafafa;
        }
        input:focus, select:focus { border-color: #B8860B; background: white; box-shadow: 0 0 10px rgba(184, 134, 11, 0.1); }

        /* सेव एंड कंटिन्यू बटन */
        .btn-submit {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #B8860B, #8B6508);
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 20px; z-index: 1; position: relative;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.3);
        }
        .btn-submit:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(184, 134, 11, 0.2); }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h3>अपनी प्रोफाइल सेट करें</h3>
        
        <div class="photo-container">
            <label for="file-input">
                <div class="photo-upload">
                    <img id="user-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
                </div>
                <div class="upload-icon">📷</div>
            </label>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">

        <div class="input-group">
            <label>पूरा नाम</label>
            <input type="text" id="user-name" placeholder="जैसे: आकाश कुमार">
        </div>

        <div class="input-group">
            <label>कक्षा</label>
            <select id="user-class">
                <option value="">अपनी कक्षा चुनें</option>
                <script>for(let i=1; i<=10; i++) document.write(`<option value="${i}">कक्षा ${i}</option>`);</script>
            </select>
        </div>

        <div class="input-group">
            <label>स्कूल का नाम</label>
            <input type="text" id="user-school" placeholder="अपने स्कूल का नाम लिखें">
        </div>

        <div class="input-group">
            <label>माता/पिता का नाम</label>
            <input type="text" id="user-parent" placeholder="अभिभावक का पूरा नाम">
        </div>

        <div class="input-group">
            <label>मोबाइल नंबर</label>
            <input type="tel" id="user-phone" placeholder="10 अंकों का नंबर" maxlength="10">
        </div>

        <button class="btn-submit" onclick="saveProfile()">सेव एंड कंटिन्यू (Save & Continue)</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDHZBpb0e7XkUmZdheFds2mpcHStdAMepw",
          authDomain: "maharshi-vedvyas-app.firebaseapp.com",
          projectId: "maharshi-vedvyas-app",
          storageBucket: "maharshi-vedvyas-app.firebasestorage.app",
          messagingSenderId: "876921715108",
          appId: "1:876921715108:web:7061c46412db12f0d32931"
        };
        firebase.initializeApp(firebaseConfig);

        // लॉगिन स्टेट चेक करें
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // अगर पहले से डेटा है तो भर दें (गूगल वाला)
                const savedPic = localStorage.getItem('userProfilePic');
                document.getElementById('user-img').src = savedPic || user.photoURL || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                document.getElementById('user-name').value = localStorage.getItem('userName') || user.displayName;
                
                // बाकी फील्ड्स अगर पहले से सेव हैं
                if(localStorage.getItem('userClass')) document.getElementById('user-class').value = localStorage.getItem('userClass');
                if(localStorage.getItem('userSchool')) document.getElementById('user-school').value = localStorage.getItem('userSchool');
                if(localStorage.getItem('userParent')) document.getElementById('user-parent').value = localStorage.getItem('userParent');
                if(localStorage.getItem('userPhone')) document.getElementById('user-phone').value = localStorage.getItem('userPhone');
            } else { window.location.href = "login.html"; }
        });

        // फोटो प्रीव्यू
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                document.getElementById('user-img').src = reader.result;
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // --- आपका अपडेटेड saveProfile फंक्शन ---
        function saveProfile() {
            const name = document.getElementById('user-name').value;
            const userClass = document.getElementById('user-class').value;
            const school = document.getElementById('user-school').value;
            const parent = document.getElementById('user-parent').value;
            const phone = document.getElementById('user-phone').value;
            const userImg = document.getElementById('user-img').src;

            // ज़रूरी फील्ड्स चेक करें
            if(name && userClass && phone) {
                try {
                    // डेटा को localStorage में सेव करना
                    localStorage.setItem('userName', name);
                    localStorage.setItem('userClass', userClass);
                    localStorage.setItem('userSchool', school);
                    localStorage.setItem('userParent', parent);
                    localStorage.setItem('userPhone', phone);
                    localStorage.setItem('userProfilePic', userImg); // फोटो यहाँ सेव हो रही है
                    localStorage.setItem('isProfileSet', 'true'); // यह मार्क करेगा कि प्रोफाइल बन गई है
                    
                    alert("नमस्ते " + name + ", आपकी प्रोफाइल सुरक्षित कर ली गई है!");
                    window.location.href = "dashboard.html"; //
                } catch (e) {
                    // अगर फोटो का साइज बहुत बड़ा हो
                    alert("फोटो का साइज बहुत बड़ा है, कृपया दूसरी फोटो चुनें।");
                }
            } else {
                alert("कृपया नाम, कक्षा और मोबाइल नंबर ज़रूर भरें!");
            }
        }
    </script>
</body>
                </html>
