<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - Mahrshi Vedvyas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fdfaf1; /* आपके ऐप की थीम के अनुसार */
            font-family: 'Segoe UI', sans-serif;
        }
        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #B8860B;
        }
        .photo-upload {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            background: #e1e1e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #B8860B;
            overflow: hidden;
            cursor: pointer;
        }
        .photo-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .plus-icon {
            font-size: 40px;
            color: #B8860B;
            font-weight: bold;
            display: none; /* Google Photo आने पर प्लस छुप जाएगा */
        }
        h3 { color: #333; margin-bottom: 20px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #B8860B;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .btn-logout {
            width: 100%;
            padding: 10px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h3>अपनी प्रोफाइल सेट करें</h3>
        
        <label for="file-input">
            <div class="photo-upload" id="profile-display">
                <span class="plus-icon" id="plus-text">+</span>
                <img id="user-img" src="" alt="Profile">
            </div>
        </label>
        <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">

        <input type="text" id="user-name" placeholder="अपना पूरा नाम लिखें">
        
        <select id="user-class">
            <option value="">अपनी कक्षा चुनें</option>
            <option value="1">कक्षा 1</option>
            <option value="2">कक्षा 2</option>
            <option value="3">कक्षा 3</option>
            <option value="4">कक्षा 4</option>
            <option value="5">कक्षा 5</option>
            <option value="6">कक्षा 6</option>
            <option value="7">कक्षा 7</option>
            <option value="8">कक्षा 8</option>
            <option value="9">कक्षा 9</option>
            <option value="10">कक्षा 10</option>
        </select>

        <button class="btn-submit" onclick="saveProfile()">आगे बढ़ें</button>
        <button class="btn-logout" onclick="logout()">लॉग आउट (Log Out)</button>
    </div>

    <script>
        // Firebase Configuration (Aakash, ise check karein)
        const firebaseConfig = {
          apiKey: "AIzaSyDHZBpb0e7XkUmZdheFds2mpcHStdAMepw",
          authDomain: "maharshi-vedvyas-app.firebaseapp.com",
          projectId: "maharshi-vedvyas-app",
          storageBucket: "maharshi-vedvyas-app.firebasestorage.app",
          messagingSenderId: "876921715108",
          appId: "1:876921715108:web:7061c46412db12f0d32931"
        };
        
        firebase.initializeApp(firebaseConfig);

        // Check if User is Logged In
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Google se naam aur photo apne aap load karna
                document.getElementById('user-name').value = user.displayName;
                document.getElementById('user-img').src = user.photoURL;
                document.getElementById('plus-text').style.display = "none";
            } else {
                // Agar login nahi hai toh login.html par bhej do
                window.location.href = "login.html";
            }
        });

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('user-img');
                const plus = document.getElementById('plus-text');
                output.src = reader.result;
                plus.style.display = "none";
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function saveProfile() {
            const name = document.getElementById('user-name').value;
            const userClass = document.getElementById('user-class').value;

            if(name && userClass) {
                localStorage.setItem('userName', name);
                localStorage.setItem('userClass', userClass);
                alert("नमस्ते " + name + ", प्रोफाइल सेव हो गई!");
                window.location.href = "dashboard.html"; 
            } else {
                alert("कृपया नाम और कक्षा दोनों भरें");
            }
        }

        function logout() {
            if(confirm("क्या आप वाकई लॉग आउट करना चाहते हैं?")) {
                firebase.auth().signOut().then(() => {
                    window.location.href = "login.html";
                });
            }
        }
    </script>
</body>
    </html>
