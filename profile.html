<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - Mahrshi Vedvyas</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }
        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        /* प्रोफाइल फोटो वाला सर्कल */
        .photo-upload {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            background: #e1e1e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #B8860B;
            overflow: hidden;
            cursor: pointer;
        }
        .photo-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* शुरू में छुपी रहेगी */
        }
        .plus-icon {
            font-size: 40px;
            color: #B8860B;
            font-weight: bold;
        }
        h3 { color: #333; margin-bottom: 20px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #B8860B;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #8B6508; }
        #file-input { display: none; } /* असली फाइल इनपुट छुपा हुआ */
    </style>
</head>
<body>

    <div class="profile-card">
        <h3>अपनी प्रोफाइल सेट करें</h3>
        
        <label for="file-input">
            <div class="photo-upload" id="profile-display">
                <span class="plus-icon" id="plus-text">+</span>
                <img id="user-img" src="" alt="Profile">
            </div>
        </label>
        <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">

        <input type="text" id="user-name" placeholder="अपना पूरा नाम लिखें">
        
        <select id="user-class">
            <option value="">अपनी कक्षा चुनें</option>
            <option value="1">कक्षा 1</option>
            <option value="2">कक्षा 2</option>
            <option value="3">कक्षा 3</option>
            <option value="4">कक्षा 4</option>
            <option value="5">कक्षा 5</option>
            <option value="6">कक्षा 6</option>
            <option value="7">कक्षा 7</option>
            <option value="8">कक्षा 8</option>
            <option value="9">कक्षा 9</option>
            <option value="10">कक्षा 10</option>
        </select>

        <button class="btn-submit" onclick="saveProfile()">आगे बढ़ें</button>
    </div>

    <script>
        // फोटो का प्रीव्यू दिखाने के लिए
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('user-img');
                const plus = document.getElementById('plus-text');
                output.src = reader.result;
                output.style.display = "block";
                plus.style.display = "none";
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // प्रोफाइल सेव करके डैशबोर्ड पर भेजने के लिए
        function saveProfile() {
            const name = document.getElementById('user-name').value;
            const userClass = document.getElementById('user-class').value;

            if(name && userClass) {
                // डेटा को लोकल स्टोरेज में सेव कर रहे हैं ताकि डैशबोर्ड पर नाम दिख सके
                localStorage.setItem('userName', name);
                localStorage.setItem('userClass', userClass);
                
                alert("प्रोफाइल सफलतापूर्वक सेव हो गई!");
                window.location.href = "dashboard.html"; 
            } else {
                alert("कृपया नाम और कक्षा दोनों भरें");
            }
        }
    </script>
</body>
</html>
